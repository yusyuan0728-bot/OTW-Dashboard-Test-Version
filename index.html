<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採購供應鏈管理儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#34C28F;--teal-light:#11362A;--teal-dark:#7FE6BF;
  --amber:#F0B254;--amber-light:#3A2D14;
  --red:#F08A6B;--red-light:#3A1F16;--red-bright:#F06548;
  --blue:#6FAEE8;--blue-light:#152A3F;
  --bg:#121417;--bg2:#1B1E23;--bg3:#262A31;
  --border:#2E323A;--border2:#3D424C;
  --text:#F0EEE9;--text2:#C2C0BA;--text3:#928F89;
  --grid:#3A3F48;--axis-text:#B0AEA8;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
body{font-family:'Noto Sans TC','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;gap:12px;flex-wrap:wrap}
.content{padding:20px 24px;flex:1}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
.sidebar-logo{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo h2{font-size:14px;font-weight:600;color:var(--text)}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.nav-section{padding:8px 12px 4px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--teal-light);color:var(--teal-dark);border-left-color:var(--teal);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.page-title{font-size:clamp(14px,2vw,16px);font-weight:500;color:var(--text)}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;outline:none}
select:focus{border-color:var(--teal)}
.role-tabs{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:20px}
.rtab{padding:4px 12px;border-radius:16px;border:none;font-size:11px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-family:inherit}
.rtab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow);font-weight:500}
.period-toggle{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:20px}
.ptog{padding:4px 11px;border-radius:16px;border:none;font-size:11px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.ptog.active{background:var(--teal);color:#0A2419;font-weight:600}
.alert-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.alert-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;border:1px solid}
.alert-pill.red{background:var(--red-light);color:var(--red);border-color:#6B3424}
.alert-pill.amber{background:var(--amber-light);color:var(--amber);border-color:#6B5424}
.alert-pill.green{background:var(--teal-light);color:var(--teal-dark);border-color:#1F5C45}
.tlight{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tl-r{background:#F06548}.tl-y{background:#F0B254}.tl-g{background:#34C28F}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sec-label:first-child{margin-top:0}
.sec-label.hero{color:var(--teal-dark);font-size:11px}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px}
@media(max-width:900px){.hero-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.hero-grid{grid-template-columns:1fr}}
.hero-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.hero-card.ok::before{background:var(--teal)}
.hero-card.warn::before{background:var(--amber)}
.hero-card.bad::before{background:var(--red-bright)}
.hero-label{font-size:11px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hero-val{font-size:clamp(26px,4.2vw,34px);font-weight:600;letter-spacing:-1px;line-height:1}
.hero-card.ok .hero-val{color:var(--teal-dark)}
.hero-card.warn .hero-val{color:var(--amber)}
.hero-card.bad .hero-val{color:var(--red)}
.hero-meta{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11px}
.hero-badge{padding:2px 8px;border-radius:8px;font-weight:500;font-size:10px}
.hero-card.ok .hero-badge{background:var(--teal-light);color:var(--teal-dark)}
.hero-card.warn .hero-badge{background:var(--amber-light);color:var(--amber)}
.hero-card.bad .hero-badge{background:var(--red-light);color:var(--red)}
.hero-target{color:var(--text3);font-size:10px}
.hero-status{margin-left:auto;font-size:18px}
.kpi-grid{display:grid;gap:10px;margin-bottom:4px}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);transition:border-color .15s}
.kcard:hover{border-color:var(--border2)}
.kcard.flagged{border-color:#8A4A35}
.klabel{font-size:10px;color:var(--text2);margin-bottom:6px;line-height:1.4}
.kval{font-size:clamp(18px,2.6vw,22px);font-weight:500;letter-spacing:-0.5px;line-height:1}
.ksub{font-size:10px;margin-top:5px}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.g-clr{color:var(--teal)}.g-clr .badge{background:var(--teal-light);color:var(--teal-dark)}
.w-clr{color:var(--amber)}.w-clr .badge{background:var(--amber-light);color:var(--amber)}
.r-clr{color:var(--red)}.r-clr .badge{background:var(--red-light);color:var(--red)}
.n-clr{color:var(--text2)}.n-clr .badge{background:var(--bg3);color:var(--text2)}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.box h3{font-size:clamp(11px,1.7vw,13px);font-weight:500;margin-bottom:12px;color:var(--text);line-height:1.35}
.box-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.box-head h3{margin-bottom:0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.row2{grid-template-columns:1fr}}
.target-legend{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--amber)}
.target-dash{width:18px;height:0;border-top:2px dashed var(--amber)}
.bar-wrap{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:11px;color:var(--text2);width:72px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-lbl.pl{width:78px;white-space:normal;line-height:1.25;text-align:right}
.bar-lbl.pl .pl-en{display:block;font-size:11px;font-weight:600;color:var(--text)}
.bar-lbl.pl .pl-zh{display:block;font-size:9px;color:var(--text3)}
.bar-row.pl-row .bar-track{max-width:58%}
.bar-pct{font-size:11px;font-weight:500;width:60px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.bar-target-mark{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--amber);opacity:.8}
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hbar-rank{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;background:var(--bg3);color:var(--text2)}
.hbar-rank.top{background:var(--teal);color:#0A2419}
.hbar-name{font-size:11px;width:66px;flex-shrink:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;height:18px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#0A2419}
.hbar-amt{font-size:10px;width:48px;text-align:right;flex-shrink:0;color:var(--text3)}
.risk-flag{position:absolute;top:0;bottom:0;width:2px;background:var(--red-bright);opacity:.7}
.donut-wrap{display:flex;align-items:center;gap:16px}
.legend-sm{font-size:11px;display:flex;flex-direction:column;gap:7px}
.leg-row{display:flex;align-items:center;gap:6px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
th{text-align:left;color:var(--text2);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;white-space:nowrap;font-weight:500}
.tag.g{background:var(--teal-light);color:var(--teal-dark)}
.tag.y{background:var(--amber-light);color:var(--amber)}
.tag.r{background:var(--red-light);color:var(--red)}
.cell-bad{color:var(--red-bright);font-weight:600}
.cell-warn{color:var(--amber);font-weight:600}
.cell-good{color:var(--teal);font-weight:600}
.risk-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.risk-name{font-size:11px;width:68px;flex-shrink:0;color:var(--text2);text-align:right}
.risk-track{flex:1;height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.risk-fill{height:100%;border-radius:6px}
.risk-limit{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7}
.risk-pct{font-size:11px;font-weight:500;width:36px;text-align:right;flex-shrink:0}
.pipeline{display:flex;align-items:flex-start;margin-bottom:12px}
.pip-seg{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:80px}
.pip-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-bottom:6px;z-index:1}
.pip-connector{flex:1;height:2px;margin-top:15px}
.pip-label{font-size:10px;color:var(--text2);text-align:center;line-height:1.3}
.pip-count{font-size:15px;font-weight:600;margin-top:2px;line-height:1}
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:560px){.rank-grid{grid-template-columns:1fr}}
.rank-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.rank-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.rank-head.best{background:var(--teal-light)}.rank-head.worst{background:var(--red-light)}
.rank-head .rh-icon{font-size:16px}
.rank-head .rhtitle{font-size:12px;font-weight:500}
.rank-head.best .rhtitle{color:var(--teal-dark)}.rank-head.worst .rhtitle{color:var(--red)}
.sup-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.sup-row:last-child{border-bottom:none}
.rnk{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.best .rnk-1{background:#34C28F;color:#0A2419}.best .rnk-2{background:#2A8A66;color:#D8F5E9}.best .rnk-3{background:#1F5C45;color:#A9E8CE}
.worst .rnk-1{background:#E0653F;color:#2A130B}.worst .rnk-2{background:#A8492C;color:#F8DCD2}.worst .rnk-3{background:#6B3424;color:#F0B49E}
.sup-info{flex:1;min-width:0}
.sup-name{font-size:12px;font-weight:500;color:var(--text)}
.sup-cat{font-size:10px;color:var(--text3);margin-top:1px}
.sup-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sup-pct{font-size:17px;font-weight:500;line-height:1}
.best .sup-pct{color:var(--teal)}.worst .sup-pct{color:var(--red)}
.micro-bar{width:64px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.best .micro-fill{height:100%;border-radius:3px;background:var(--teal)}
